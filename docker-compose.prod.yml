version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trustshield-postgres
    environment:
      POSTGRES_USER: trustshield
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trustshield-secure-prod}
      POSTGRES_DB: trustshield
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustshield"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - trustshield

  redis:
    image: redis:7-alpine
    container_name: trustshield-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-trustshield-secure-prod}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - trustshield

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: trustshield-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://trustshield:${DB_PASSWORD:-trustshield-secure-prod}@postgres:5432/trustshield
      TRUSTSHIELD_REDIS_URL: redis://:${REDIS_PASSWORD:-trustshield-secure-prod}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-trustshield-assets}
      USE_S3_SIGV4: ${USE_S3_SIGV4:-true}
      LOG_LEVEL: info
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - trustshield
    volumes:
      - ./logs/api:/app/logs

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: trustshield-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.trustshield.local}
      NEXT_PUBLIC_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      NEXT_PUBLIC_OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - trustshield

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: trustshield-admin
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.trustshield.local}
    ports:
      - "3001:3000"
    restart: unless-stopped
    networks:
      - trustshield

  nginx:
    image: nginx:alpine
    container_name: trustshield-nginx
    depends_on:
      - api
      - web
      - admin
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    networks:
      - trustshield

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  trustshield:
    driver: bridge
